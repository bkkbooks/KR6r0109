front:
  text: 永明道迹序衆生之情處處執著菩薩教化處處破除如嬰兒疾病為乳所傷良醫審證止乳與藥疾則旋已又病久困為藥所傷智人知之遣醫罷藥患亦隨愈然不妨乳有哺養之益藥有療治之功止乳是權而槩奪則餒死者必相藉矣遣醫是暫而例遣則沈痼者必無幸矣三乘對治者療煩惱之妙藥也衆善齊臻者養法身之乳湩也滯之則礙正知見故菩提達磨而降皆絶言思以止遣之廢之則乖圓融門故永明大師嗣與渾事理而以身範焉大師法眼之嫡孫韶師之真子妙契單傳親蒙記莂然禪宗不立文字而師樂説無礙百卷河懸禪宗呵斥坐禪而師跏趺九旬鷃巢衣裓禪宗指決唯心無他淨土而師經行持念角虎示人禪宗但貴眼正不貴行履而師萬善同歸勤行百八所以抑虗濫示之隄防導因地趍於極果真金出冶盛作莊嚴大海吞流不辭涓滴真祖位大成之聖法王金輪之尊者也大師示寂後塔於大慈山院曰壽寧圮廢湮泯址歸俗士淨慈僧壑公者夙懷遺迹號慕詢求於蓁莾中竟得設利緇白瞻禮如重霾餘慧日再見僉謀於法堂之背建窣堵波用嚴供養併彚緝遺事附以圖讚目曰永明道迹傳布四衆於戲洪波白浪靈骨具存潭北湘南塔樣無改育王七寶古佛一錐於未添香前共著眼目萬曆丁未首夏望日歇菴居士陶望齡書於會稽法華山天衣精舍
