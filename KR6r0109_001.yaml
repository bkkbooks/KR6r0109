body:
  text: 永明道迹目録淨慈寺嗣法雲孫大壑輯六夢居士虞淳熙寓庸居士黃汝亨同校閲凡三十二條永明真像感親息爭群羊聽經金門獻賦放生罹法慷慨見宥捨俗投師斥鷃巢衣參依蒙讖聖授蓮花神人護懺密承甘露雪竇示衆中興靈隱淨慈開山永明升座華臺課經別峰行道營塔鎮潮古佛互證高麗歸依天台説戒法食施鬼勸念往生降伏神煞演法雨花預知時至茶毗遺瑞閻君禮像雉兒聽法鋪張儒術權寄仙蹤永明道迹目録終陸樹聲贊曰稽首智覺稱大雄靈根卓頴超神童諸佛海藏固無極法華經藏猶難窮師當能言義已竟誦感群羊時跪聽長為監守靡國儲捐生贖生奚憚誅臨市悅豫如登假人主感悟釋其械不獨刑逃世并逃放生猶覺度生高如來所有一切法維師一身為總括彌陀為塔願無疆一一塔放無量光佐彼慈尊白玉相能令堪忍知西向師於別峰稱佛名螺貝天樂空中生宗鏡開函照異域高麗王者遙屬目金線伽黎紫晶珠黃金澡瓶執贄殊異國冥都兩傾注十方皈敬想如是馮夢禎贊曰夫神之於形也猶春在花枝春殘則花謝神往則形徂劇工如宋人鏤玉為瓣或混其真似其如化工無工乎葉公嘗工畫龍見真龍而怖走寫生固不足以當生而況無生乎壽師為像則不然譬夫摩尼神珠非色非空非生非滅亘耀幽顯雨諸珍寶觀至幽若冥界衰殺生髏如閻羅恆展幀以投誠知師深證無生以無生生相度無盡衆生而無度生相斯為永明師之妙相也歟五代杭州慧日永明寺智覺禪師諱延壽字沖玄號抱一子本丹陽人後遷餘杭遂家焉父王公母某氏師生方能言坐高榻值父母反目奮躍而下跪泣於地親感悅永偕琴瑟曹學佺贊曰師當孩提時便知奮擲身命感化所天後踐法王之位調御群靈者其進力有自矣經言頻伽在鷇聲逾衆鳥狻猊出胎威懾百獸物固有天縱者吾生欲辦未來於今日尚荏苒流光瞻仰童真寧無慚德也歟師總角時即歸心佛乘不茹葷日唯一食持法華經七行俱下每展卷時感群羊跪聽葛寅亮曰只這件有等玲利漢聞言不信顧此蠢然者爾反有一段入處豈不可怪轉下看去鸚鵡證果蚯蚓談經物愈微神通愈顯夫此猶屬有知未為奇特至于頑石點頭大駭人矣從是諦觀那説法的果是壽禪師麼這聽法的還是羊麼咦上林春色早花鳥總宜人師年十六為儒生時吳越文穆王元歡鎮杭州師獻齊天賦衆推間世之才咸欲官之黃汝亨贊曰為依佛耶自獻金門為宗儒耶誰名沙門賦心賦神東踊西升吳越之師清泰之君齊天中天之壽壽無量而無名名可求兮彌勒入補處以稱尊惟儒與佛不隔一塵師嘗為餘杭庫吏後遷華亭鎮將督納軍需屢以庫錢買魚蝦等物放之事發坐死領赴市曹虞淳貞曰物我同體兮何放生而罹死謂非同體兮何入死而出生王法佛法即異而成至人無己惟慈是膺蓋視蠛蠓猶大覺臨藁街如化城宋旭贊曰慷慨臨刑思灑然不妨多費放生錢君王感宥重加敬遂得傳燈繼祖筵吳越王遊於江上夢老人引魚蝦數萬至云此皆稅務官所放者願王免其罪王窹而使人探之師臨死地面無戚容典刑者怪而詰之師曰吾於庫錢毫無私用為贖生命耳今死當徑生西方極樂上品又何戚焉探者覆命王釋之蘇子瞻志林云禪師應以市曹得度故菩薩乃現市曹以度之學出死入生法得向死地走一遭抵三千年修行余自逐海上去死地稍近心頗憂之願學永明壽師放生以證阿羅漢果敬以亡母蜀郡太君程氏遺留簪珥盡買放生以薦父母冥福師兒時即以出家為念父母不聽遂斷葷刺心血濡毫寫經終期副願至年三十吳越王知師慕道乃從其志放令出家捨妻孥投龍册寺翠巖禪師削染登戒執勞供衆都忘身宰衣不繒纊食無重味野蔬布襦以遣朝夕潘之恆贊曰嘗觀世智辨聰之士有欲割塵俗而白首無能者有辭親出家耽染世緣而黑業日深者若師金門獻賦嘗推間世之才華亭備軍早擅脫頴之秀當強仕之年卒斷煩惱之髮為靈山法臣而化敷異境嗚呼師真人傑也哉師嘗習靜於天台智者巖跏趺不起者九旬有鳥似斥鷃巢衣中育雛定起乃去金學曾曰壽師在天台斥鷃巢衣一事此聖師定中不思議境界與如來鵲巢其頂相似非機忘議盡心同木石者未易臻此即如鴿就如來影中頓無驚怖豈莊生沙鷗之喻耶余未達其境不能贊一詞惟不能贊一詞然後見禪定不可思議之妙也具眼者以為何如師從定起尋往天台山德韶國師執弟子禮北面師事之時國師眼目天人一見而深器焉密授心印仍謂師曰汝與元帥有緣他日當大興佛事惜吾不及見耳朗士吳之鯨贊曰法王闡法亦資法力如空鼓風若助之翼韶師示讖法緣夙植靈鷲宗風南屏主席竹祖桐孫世食其德大劫不壞緣緣空寂薪盡火傳請問慧月師於國清中夜旋繞見普賢所執蓮花忽然在手因思宿有二願進退未決遂登智者禪院作二紙鬮一曰一心禪定一曰萬善生淨土冥心禱曰於此二途功易成者須七拈著信手拈之乃至七度一無間隔由是一意專修淨業比丘洪恩贊曰心欲生天夢想輕舉心存佛國聖境冥現夢矢穢者得財夢棺器者得位此處世出世念慮正倒之有徵也方師行道感斯瑞應夫普賢為萬行之師蓮花表一乘之法豈師之功階真淨果證妙圓之先眹者歟師一生隨處常建法華懺堂莊嚴淨土晝夜六時普為法界衆生代修法華懺後於國清寺結壇修禮夜見神人持戟而入師呵之曰何得擅入對曰久積淨業方到此中鄭之惠贊曰師懺衆生誰為師懺漫漫長夜千古不旦虞公開士鋟我儀範舉似介公壑公攸相九原可作玄珠有粲巍巍華臺悠悠法藏恍惚見之手蓮牙象師嘗振錫金華天柱峰誦法華經三載一夜禪定中見觀音乘空而來以甘露灌其口從此遂發無礙辨才下筆盈卷江鏷贊曰若云有法難修試做三年之攻苦若云有修難證試參一滴之甘涼斥鷃成巢現師定體三年一日也雉兒立化現師慧體一滴千江也夫是之謂妙法周廣順二年師説法於明州雪竇山學者輻輳師上堂云雪竇這裏迅瀑千尋不停纖粟奇巖萬仞無立足處汝等諸人向甚麼處進步時有僧問雪竇一徑如何履踐師云步步寒花結言言徹底氷元美王世貞心賦序云天竺古先生説法四十九年至竟無一法可説未覺則萬語不為多覺則一字不為少嗚呼是何壽老之言之多也夫亦為學人地也當四十九年説法一法而諸經異名諸學人者尋名而徇之則益遠矣建隆元年大檀越吳越國錢忠懿王弘俶見靈隱傾廢請師復興重創殿宇前後計一千三百餘間及四面圍廊自三門繞至方丈左右相通禪師實為靈隱中興之祖比丘袾宏贊曰鷲嶺頻伽音冷泉功德水彌陀也自飛來數朵青蓮擁翠感動惡發王高占善權位登樓滄海日懸説法巫山雨霈至今直指不欹斜一鏡兩湖無向背吳越忠懿王於顯德元年勑建永明禪寺即今淨慈寺也賜智覺禪師號命師住持為第一世會三宗師德集宗鏡録一百卷萬善同歸集神棲安養賦心賦詩偈等九十七卷頒入大藏流行居永明十五載手度弟子二千餘人嗣師之法者杭州乾明津禪師富陽子蒙和尚虞淳熙贊曰門外一湖水堂上一輪鏡鏡中西子妍湖裏菱花映錯認涉入重重法眼便增翳病若箇永明旨誰為智覺境牽回長耳疥癩兒驚起灰心五百聖師升座僧問如何是永明妙旨師曰更添香著曰謝師指示師曰且喜沒交涉僧禮拜師曰聽取一偈欲識永明旨門前一湖水日照光明生風來波浪起傳如述紫柏大師言古今禪教相非性相相忌久矣唯壽師宗鏡録括三藏會五宗故其卷以百計學者多望洋觀師升坐直拈西子一湖擲向當臺風動波起日照明生道是禪是教是性是相比量非比量唯識非唯識一涉擬議便入黑山鬼窟非永明旨矣況諸宗義學筌蹄乎後之覽宗鏡者具隻眼始得古之伯牙絶絃匠石輟斤讀斯語不能不為二師感也慧日峰迤西巖洞㟏岈湖山映帶禪師每日必於此巖誦妙法蓮華經垂化共計萬三千部嘗感諸天雨花臺仍舊名云李培贊曰止觀明執禪呵教名之曰愚泥教篾禪名之曰狂狂愚之過雖小不同邪見輪轉蓋無差別吾師乎禪徹唯心了一字之本空經宣上乘達海藏之無礙天之所以雨花者殆表解行兩全之妙因者歟師居永明日課一百八事未嘗暫怠至暮每獨往別峰行道念佛然密從之者常數百人清宵月朗空中時聞螺貝天樂之聲感忠懿王聞而歎曰自古求西方者未有若是之切至也特為建西方香嚴殿於赤巖以成其志屠本畯贊曰禪師道高德盛為法眼宗師猶自晝夜躬行一百八事行道致天樂聞空念佛感國王頌德直入普賢無疲厭行海者昔有贊師光昭萬古為再生之善導語不綺矣今之卑功行而談本體假機權而希實際者所由殆與師旨不亦異乎錢塘古稱羅剎江其潮汐之險不減瞿塘三峽錢王有吳越時築捍海塘工役難就曾以萬弩射潮頭終不能殺其勢開寶三年師奉詔於月輪峯建創六和塔高九級五十餘丈用以為鎮自是潮習故道居民德之來宗道贊曰昔者陽侯肆虐妄窺吾滸之民室即神龍後身逞萬弩不足以當師之築塔夫弓矢之與窣堵均物也要之非師之願力冥有所持耶今塔漸圮而潮勢日橫矣安得檀越莊嚴多寶若開寶年知師身在寂光當助歡喜後漢乾祐三年十一月二日吳越王以誕辰飯僧於永明寺王問師云今有真僧降否師曰長耳和尚乃定光佛應身也王趨駕參禮定光云彌陀饒舌少選跏趺而化陶望齡贊曰羅千燈於一室那律不能分其光合萬派於滄溟娑竭不能別其濕諸佛法流智照恆如焉之師也非同現同非異示異揭古今時劫為旦暮死生人我為俳優知此法界一相無相之旨寧有餘蘊哉高麗國王覽師宗鏡等録遣使航海齎書敘弟子禮奉金線織成袈裟紫水晶數珠金澡罐等彼國問道之僧承師印可記莂者三十六人相繼歸本國各化一方覺範洪禪師曰永明宗鏡録不獨異國君長讀之皆望風稱門弟子即元祐間寶覺和尚宴坐龍山雖德臘俱高猶手不釋卷曰吾恨見此書之晚也今天下名山莫不有之而學者終身有未嘗展卷者唯飽食橫眠遊談無根而已謂之報佛恩乎負佛恩乎師於開寶七年復入天台開菩薩戒求受者約萬餘人普獲具佛律儀謹潔無犯秦舜友贊曰禪師天台説戒之時測其聖心當云止非曰戒本律身麁範修行初步譬之升高自下涉遐自邇求道證聖未有不由此入也直恐戒力不勝遂成魔便此路謹防別門俱淨可不信受果能耳入心受不違所説則因戒生定因定發慧到此始知勝淨明心本無有非戒亦妄説師每夜普為六道冥官九品鬼神説法授戒并施水陸空行飢餓鬼神法食為益實巨屠隆贊曰世之餓夫冥之飢魂念等求食急尤在人人豈盡濟暇為鬼計善哉導師為平等施人鬼相滅施無所施施且無矣問誰為與與者不立食當誰取憑此願力是名法食空拳作施飽乎八極孫孟芳贊曰人之不食七日必絶鬼神飢虗動止千劫惟師為慈延促等攝拔以爾𦦨充以禪悅鬼耶人耶即生即佛師念世間業苦衆生不能解脫專以念佛勸人同生淨土乃印彌陀塔四十八萬本勸人禮念世稱宗門之標準淨業之白眉天如則禪師曰多見今之禪者不究如來之了義不知達磨之玄機空腹高心習為狂妄見修淨土則笑之曰彼學愚夫愚婦之所為何其鄙哉余嘗論其非鄙愚夫愚婦乃鄙文殊普賢龍樹馬鳴等也於是永明和尚剖出心肝主張淨土既悟達磨直指之禪又能致身於極樂上品以此解禪者之執情以此為末法之勸信故余謂其深有功於宗教者也永明聽法者衆師就便地為九眼𭍬犯金神七煞方衆諫弗聽有人數晨起見七人蓬首沐髮湖水中迫問之曰我七煞神也壽師營𭍬吾頂既不敢移別宮違歲君令而又不敢殃古佛之徒日受大小溲沐去穢耳師聞竟不除𭍬蓋定業云袁宏道曰是𭍬匪穢吾土非淨門前湖水實灌汝頂惟乾矢橛蜣蜋一丸輪轉不停斯羽翩然憫彼頑冥瀆神借佛窟離溺器而成骨穴何以示人金鎗馬麥李日華曰精粲芳羞茹退變易蓮生淤泥壤壅嘉植淨穢何性心自別白神人趣殊顛倒則一五濁之世唯佛先入師行道至武林山東二里開山演法即感四王天花下墜一時緇白歸投龍象輻輳淳祐間賜額永福院未幾遂嗣秀王香火宣德十年敕賜聖壽禪寺懶龍居士李應筠曰風煙花開世界成就霜露果熟王子誕生沙劫壞空與無上聖趣皆是衆生心花自為開含法味祖味祇作雨露助發之緣但能二六時中不潤苦芽自然優鉢常現庶不負永明恩德也師於開寶八年每見金臺寶樹或聞天樂異香預知時至殊勝甚多逮十二月二十四日示疾越二日晨起焚香趺坐而逝壽七十二臘四十二包世杰贊曰世之存亡休咎即讖緯術數之學皆能預測其端倪師之預知其時無足詫者然而金臺寶樹天樂異香此清泰現量境也頃著娑婆非悟唯心淨土而念佛功圓者自在往生之若是耶噫師居恆以淨土一門攝人者徵矣夫師既化茶毗舍利周身如鱗砌以開寶九年正月六日建塔葬于大慈山樹亭志焉宋太宗皇帝額額曰壽寧禪院龔遇春曰壽師茶毗傳載其舍利若鱗砌志多也及其法嗣壑公出糞壤之遺蛻示余則又僅僅十數粒得毋因其少而疑不符耶不知人惟其心不惟其物壑公後壽師六百餘載一旦欲起而光大之即是一念莖草可作全身即是一念瓣香可成七級又奚必標奇啓信摻券作合哉或曰放光動地世尊亦不得已而為之也蓋為見相者設也果爾壑公又何韙于疑哉師涅槃後有僧來自撫州經年禮拜禪師之塔人問其故僧云我病入陰府見殿上供畫僧一幀閻羅王每日自來頂禮遂問主吏此是何人吏曰此杭州永明寺壽禪師也凡人死者皆經我曹判生唯此師徑生西方上上品矣王重其德故圖像而敬事焉唐虞盛曰僧傳閻老瞻像是夢話亦是鬼話何必究其有無第世人多不信佛而未始不畏閻老儻聞是語已亦以閻老之禮禮之而因知有佛則地獄一言未必非接引西方之寶筏矣雖然彼斥鷃群羊之馴服豈亦有畏心哉人實愧焉師身後為善繼禪師嘗刺血書華嚴經於姑蘇半塘寺頃有聽經之雉一日集堂中踰時不動衆驚視之已瞑目斂翮立化遂為築塔寺中陳繼儒曰雉兒塔今在王百谷半偈菴中余至半塘壽聖教寺後落落長松而已此塔宜還本處以標靈迹昔廬州有坐化貓峽中有坐化胡孫李公擇家有坐化蛇韋皋有鸚鵡舍利無為軍永寧縣有棲于庭纍日不去取視之已立化矣至於僧爽聽經之雞生公點頭之石歷歷載在古册無足怪者何疑於雉兒塔乎良由師説法洞入雉兒腹中有情無情總歸一心法界若于此處致疑便成異類姑與之日待雉兒重活與汝究竟此段大事宋學士濂未出母胎母夢異僧手寫華嚴來謂母曰吾乃永明延壽願假一室以終此卷母夢覺已學士即生因名曰壽後更名濂六歲日記二千餘言九歲能詩入青蘿山盡閲鄭氏所著書數萬卷其文章如武庫一開千珍萬寶光采爛然有集八十三卷始見太祖即勸不嗜殺人授太子諸王春秋尚書大學衍義每對太祖語漢武梁武好仙好佛之失太祖稱之為賢為君子為純臣天下既定凡郊廟山川祠祀諸大政大令皆所裁定海外諸國朝貢必問安否為人篤倫理行事俯仰無愧真昭代之真儒也學士得法千巖長禪師撰塔銘三十餘篇堪續傳燈其護教編記則宗鏡之末光也又發明正一清微大洞甘水仙派及闡龍虎大丹不遺餘力讚揚張吳二天師皆有傳雖梓童玄武並紀靈迹論者謂深得華嚴之旨云好騎白牛夔江坐脫後頃有見之終南山者云沖舉之日距今僅百年耳陶齡曰愚謂禪師脫頴娑婆棲神安養藏輪諸傳記鑿鑿可徵也何猶然決䇿名場而遊心仙籍為厭彼極樂復為人間之勞乎登上品者為有退轉乎為師中無實證乎雲棲大師曰師之行道普賢親授以妙蓮師之既化𦦨魔躬瞻乎寶相實證之果無疑似退之益碩大使果極釋迦不妨百界之分身記獲彌陀正好大慈之填願勸太祖以不嗜殺人佐千巖而弘傳法印所謂至人無己妙應斯圓知一鏡虗明而萬象畢現者差得師之宗本歟大壑曰永明大師不思議人也以不思議人示不思議行惟後世刻畫其迹譬之紛列群器囿彼太虗寧能盡其量哉宜乎大藏諸傳所載修證因果互有同異也壑慮學者從同異中橫起疑情故總合諸傳托其始末行實凡三十條目曰永明道迹仍繪其像并録古今名賢偈贊用梓流通使同信向因知無相之迹不越是相有所悟入耳復合掌稽首贅以偈曰善哉導師乘宿願輪示羈襁褓投地悟親妙蓮華王信解實鮮師當齓髫誦不釋卷相彼群羊蠢蠢異生亦感慈化馴跪而聽長督軍儲兼徵稅務屢緣放生漸傾其庫形臨市曹心獨逍遙王慨宥之世以是逃天柱入定九旬為際斥鷃巢衣國師深器擇法藏鬮萬善同修蓮花冥授神人夜投復遁金華坐忘道樹大士乘通灌以甘露自是咸稱香象義龍群魔褫魄七衆追從雪竇千尋危湍萬仞一喝之餘夢孰不醒鷲嶺既荒猿洞僅存六環才振百廢具興慧日宏開五山首寺浩劫永明聖皇所賜師子為座宗鏡飛光無法不攝靡心弗降夜繞別峯不遑寧息螺貝佛聲互聞國邑經彼崇臺日演三車虎應獲記天為散花彌陀定光一佛兩佛怪汝長耳嫌師饒舌風靡異域遣使來歸繼之問道霧擁雲驅建大法幢功超萬鏃遠障狂瀾永寧越國恆以淨業攝念往生撫期坐逝仙樂來迎靈蛻既焚香薪亦熾現設利羅遍身鱗砌杳杳重泉夫誰知音炎魔羅主覩影歸心雉塔標奇鸞坡流譽一月千江無來無去偶逢金骨迎返湖濵正猶窮子歸依所親剎剎塵塵在在處處願此流通寸裏如是放生贖命止殺興哀斷燒煮之殃釋籠之縶續壽量之海成慧命之因遂得水陸全形息陷網吞鈎之苦飛沉任性脫焚林竭澤之憂免使穴罷新胎巢無舊卵脂消鼎鑊肉碎刀砧昔有禪師鄧隱峰未出家時曾射一猿子墮地而終須臾猿母亦隨而死因剖腹開視腸寸寸斷遂捨其射業因此出家是知人形獸質受報千差愛結情根其類一等命既無於大小罪豈隔於賢愚誤傷誤殺尚答餘殃故作故為寧逃業迹或受一日戒或持八關齋或不噉有情或永斷葷血不值三災之地能升六欲之天既為長壽之緣又積大慈之種萬曆歲次丙午秋九月霜降日古杭淨慈寺大壑稽首書
